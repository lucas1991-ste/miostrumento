name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 4 * * *'        # ogni giorno alle 4:00 UTC (puoi cambiarlo)
  workflow_dispatch:           # permette di lanciarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.2   # ← versione aggiornata
        with:
          upstream_repository: realbestia1/EasyProxy          # ← CAMBIA con il repo originale
          upstream_branch: main                               # o master se l'originale usa master
          target_branch: main                                 # il branch del tuo fork
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
